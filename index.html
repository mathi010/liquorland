<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiquorStore | Premium Drinks Delivery</title>

<meta name="description" content="LiquorStore - Bebidas premium y económicas con delivery 24hs en San Juan. Pedidos por WhatsApp.">
<meta property="og:title" content="LiquorStore - Premium Drinks Delivery">
<meta property="og:description" content="Atención 24 horas. Envíos sujetos a disponibilidad.">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#0B0B0C;
color:#fff;
font-family:'Poppins',sans-serif;
}

header{
position:fixed;
top:0;
width:100%;
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
font-family:'Playfair Display',serif;
font-size:24px;
letter-spacing:1px;
}

.logo span{color:#C6A75E;}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

.hero{
padding-top:140px;
text-align:center;
padding-bottom:80px;
}

.hero h1{
font-size:48px;
font-family:'Playfair Display',serif;
margin-bottom:10px;
}

.hero p{
color:#ccc;
}

.section{
padding:60px 40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#151515;
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
border-radius:10px;
}

.price{color:#C6A75E;font-weight:600;}

.btn{
background:#C6A75E;
color:#000;
padding:12px 22px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:10px;
cursor:pointer;
font-weight:600;
border:none;
}

.btn:hover{background:#fff;}

footer{
background:#000;
text-align:center;
padding:40px;
color:#aaa;
}

.cart{
position:fixed;
right:0;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
box-shadow:-5px 0 20px rgba(0,0,0,0.5);
transform:translateX(100%);
transition:0.3s;
z-index:1200;
}

.cart.open{transform:translateX(0);}

.cart h3{margin-top:0;}

.cart-item{
border-bottom:1px solid #333;
padding:10px 0;
}

.cart-total{
margin-top:15px;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
text-decoration:none;
font-size:22px;
z-index:1100;
}
</style>
</head>
<body>

<header>
<div class="logo">Liquor<span>Store</span></div>
<nav>
<a href="#productos">Productos</a>
<a href="#contacto">Contacto</a>
<a href="#" onclick="toggleCart()">🛒</a>
</nav>
</header>

<section class="hero">
<h1>Premium Drinks Delivery</h1>
<p>Servicio exclusivo 24 horas en San Juan. Envíos sujetos a disponibilidad.</p>
</section>
<section id="productos" class="section">
<h2 style="text-align:center;font-family:'Playfair Display',serif;">Catálogo</h2>

<div class="products" id="productList"></div>

</section>

<div class="cart" id="cart">
<h3>Tu Pedido</h3>
<div id="cartItems"></div>
<div class="cart-total" id="cartTotal">Total: ARS 0</div>
<button class="btn" onclick="sendWhatsAppOrder()">Finalizar por WhatsApp</button>
<button class="btn" style="background:#444;color:white;margin-top:10px;" onclick="toggleCart()">Cerrar</button>
</div>

<footer id="contacto">
<p>LiquorStore © 2026 - Atención 24hs - San Juan</p>
</footer>

<a class="whatsapp" id="whatsappBtn" target="_blank">💬</a>
<script>
/* ========= CONFIG ========= */
const WHATSAPP_NUMBER = "549423703514"; // tu número en formato internacional (sin +)

/* ========= PRODUCTOS =========
   Cambiá precios cuando quieras. Estos son ejemplos premium + económico.
*/
const products = [
  { id: 1, name: "Jack Daniel's 750ml", category: "Whisky", price: 32000, img: "https://images.unsplash.com/photo-1528826194825-5ed08ffdd0d8?auto=format&fit=crop&w=900&q=70" },
  { id: 2, name: "Chivas Regal 12 750ml", category: "Whisky", price: 38000, img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=900&q=70" },
  { id: 3, name: "Fernet Branca 750ml", category: "Aperitivo", price: 13000, img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&w=900&q=70" },
  { id: 4, name: "Gancia 1L", category: "Aperitivo", price: 8500, img: "https://images.unsplash.com/photo-1532635223-478bb0c9372c?auto=format&fit=crop&w=900&q=70" },
  { id: 5, name: "Vino Luigi Bosca 750ml", category: "Vino", price: 16000, img: "https://images.unsplash.com/photo-1516594917710-6c7ce8c13ae1?auto=format&fit=crop&w=900&q=70" },
  { id: 6, name: "Espumante Extra Brut 750ml", category: "Vino", price: 12000, img: "https://images.unsplash.com/photo-1510627498534-cf7e9002facc?auto=format&fit=crop&w=900&q=70" },
  { id: 7, name: "Corona 710ml (retornable)", category: "Cerveza", price: 3500, img: "https://images.unsplash.com/photo-1543007630-9710e4a00a20?auto=format&fit=crop&w=900&q=70" },
  { id: 8, name: "Heineken 473ml", category: "Cerveza", price: 2600, img: "https://images.unsplash.com/photo-1605276373954-0c4a0dac5f12?auto=format&fit=crop&w=900&q=70" }
];

let cart = [];

/* ========= UI ========= */
function moneyARS(n){
  return "ARS " + Number(n).toLocaleString("es-AR");
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function renderProducts(){
  const container = document.getElementById("productList");
  container.innerHTML = "";

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}">
      <h3 style="margin:12px 0 5px;">${p.name}</h3>
      <p style="color:#aaa;margin:0 0 6px;">${p.category}</p>
      <p class="price">${moneyARS(p.price)}</p>
      <button class="btn" onclick="addToCart(${p.id})">Agregar</button>
    `;
    container.appendChild(card);
  });
}

function addToCart(id){
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);

  if(existing){
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  renderCart();
}

function removeFromCart(id){
  cart = cart.filter(i => i.id !== id);
  renderCart();
}

function changeQty(id, delta){
  const item = cart.find(i => i.id === id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0){
    removeFromCart(id);
    return;
  }
  renderCart();
}

function renderCart(){
  const cartItems = document.getElementById("cartItems");
  const cartTotal = document.getElementById("cartTotal");
  cartItems.innerHTML = "";

  if(cart.length === 0){
    cartItems.innerHTML = `<p style="color:#aaa;">Tu carrito está vacío.</p>`;
    cartTotal.textContent = "Total: ARS 0";
    return;
  }

  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <strong>${item.name}</strong>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <button class="btn" style="padding:6px 12px;border-radius:12px;" onclick="changeQty(${item.id}, -1)">-</button>
        <span style="font-weight:600;">${item.qty}</span>
        <button class="btn" style="padding:6px 12px;border-radius:12px;" onclick="changeQty(${item.id}, 1)">+</button>
        <span style="margin-left:auto;color:#C6A75E;font-weight:700;">${moneyARS(item.price * item.qty)}</span>
      </div>
      <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:#ff5a5f;cursor:pointer;margin-top:8px;font-weight:700;">
        Eliminar
      </button>
    `;
    cartItems.appendChild(div);
  });

  cartTotal.textContent = "Total: " + moneyARS(total);
}

/* ========= WHATSAPP ========= */
function sendWhatsAppOrder(){
  if(cart.length === 0){
    alert("Tu carrito está vacío.");
    return;
  }

  let msg = "Hola LiquorStore, quiero hacer un pedido:%0A%0A";

  cart.forEach(item => {
    msg += `${item.qty}x ${item.name} - ${moneyARS(item.price * item.qty)}%0A`;
  });

  const total = cart.reduce((sum,i)=> sum + (i.price*i.qty), 0);
  msg += `%0A*Total:* ${moneyARS(total)}%0A%0A`;
  msg += "Mi zona es: ________%0A";
  msg += "Forma de pago: ________";

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
  window.open(url, "_blank");
}

/* Botón flotante WhatsApp (consulta sin carrito) */
function setupWhatsAppButton(){
  const btn = document.getElementById("whatsappBtn");
  const msg = "Hola LiquorStore! Quiero consultar precios y envío. Mi zona es: ________";
  btn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
}

/* ========= INIT ========= */
renderProducts();
renderCart();
setupWhatsAppButton();
</script>

</body>
</html>
