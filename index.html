<style>
body{

background:#0B0B0C;

}
header{
position:fixed;
top:0;
width:100%;
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}
.logo{
font-family:'Playfair Display',serif;
font-size:24px;
}
.logo span{color:#C6A75E;}
nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
}
.hero{
padding-top:140px;
text-align:center;
padding-bottom:80px;
}
.hero h1{
font-size:48px;
font-family:'Playfair Display',serif;
}
.btn{
background:#C6A75E;
color:#000;
padding:12px 22px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:15px;
cursor:pointer;
}
.section{
padding:60px 40px;
}
.filters{
text-align:center;
margin-bottom:30px;
}.filters button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#222;
color:#fff;
cursor:pointer;
}
.filters button.active{
background:#C6A75E;
color:#000;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}
.card{

padding:20px;
border-radius:15px;
transition:0.3s;
}
.card:hover{transform:translateY(-5px);}
.card img{
width:100%;
border-radius:10px;
}
.price{color:#C6A75E;}
.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
box-shadow:-5px 0 20px rgba(0,0,0,0.5);
}
.cart h3{margin-top:0;}
footer{
background:#000;
text-align:center;
padding:40px;
color:#aaa;
}
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;

}
</style>
</head>
<body>
<header>
<div class="logo">Liquor<span>Store</span></div>
<nav>
<a href="#productos">Productos</a>
<a href="#contacto">Contacto</a>
</nav>
</header>
<section class="hero">
<h1>Premium Drinks Delivery</h1>
<p>Servicio exclusivo 24 horas en San Juan.</p>
</section><section id="productos" class="section">
<h2>Catalogo</h2>
<div class="filters">
<button class="active" onclick="filterProducts('all')">Todos</button>
<button onclick="filterProducts('whisky')">Whisky</button>
<button onclick="filterProducts('vino')">Vino</button>
<button onclick="filterProducts('cerveza')">Cerveza</button>
</div>
<div class="products" id="productList"></div>
</section>
<div class="cart" id="cart">
<h3>Carrito</h3>
<ul id="cartItems"></ul>
<button class="btn" onclick="sendWhatsApp()">Enviar Pedido</button>
</div>
<section id="contacto" class="section">
<h2>Contacto</h2>
<p>Atencion 24 horas. Zona sujeta a disponibilidad.</p>
</section>
<footer>
© 2026 LiquorStore - Premium Drinks Delivery
</footer>
<a class="whatsapp" href="https://wa.me/549XXXXXXXXXX">■</a>
<script>
const products=[
{name:"Jack Daniels",price:32000,category:"whisky"},
{name:"Chivas Regal",price:38000,category:"whisky"},
{name:"Luigi Bosca",price:16000,category:"vino"},
{name:"Corona 710ml",price:3500,category:"cerveza"}
];
let cart=[];
function displayProducts(list){
const container=document.getElementById("productList");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p class="price">ARS ${p.price}</p>
<button class="btn" onclick="addToCart('${p.name}',${p.price})">Agregar</button>
</div>`;
});
}
function filterProducts(category){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
if(category==="all"){displayProducts(products);}
else{displayProducts(products.filter(p=>p.category===category));}
}
function addToCart(name,price){
cart.push({name,price});
renderCart();
}
function renderCart(){
const list=document.getElementById("cartItems");
list.innerHTML="";
cart.forEach(item=>{
list.innerHTML+=`<li>${item.name} - ARS ${item.price}</li>`;
});
}
function sendWhatsApp(){
let message="Hola quiero pedir:%0A";
cart.forEach(item=>{
message+=`${item.name} - ARS ${item.price}%0A`;
});
window.open(`https://wa.me/549XXXXXXXXXX?text=${message}`);
}
displayProducts(products);
</script>
</body></html>
