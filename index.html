<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiquorStore</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0b0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LiquorStore">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= Splash ================= -->
<div id="splash" class="splash">
  <div class="splash__card">
    <img class="splash__icon" src="icons/icon-192.png" alt="LiquorStore">
    <div class="splash__title">LiquorStore</div>
    <div class="splash__sub">San Juan, Argentina</div>
    <div class="splash__bar"><span></span></div>
  </div>
</div>

<!-- ================= Age Gate ================= -->
<div class="agegate" id="ageGate">
  <div class="agegate__card">
    <div class="agegate__badge">+18</div>
    <h1 class="agegate__title">Confirmación de edad</h1>
    <p>Este sitio es solo para mayores de 18 años.</p>
    <div class="agegate__actions">
      <button onclick="acceptAge()">Soy mayor de 18</button>
      <button onclick="window.location.href='https://google.com'">Salir</button>
    </div>
  </div>
</div>

<!-- ================= Contenido Principal ================= -->
<div id="app">
  <!-- Tu contenido actual vive acá -->
</div>

<script src="app.js"></script>

<!-- ================= Splash Script ================= -->
<script>
window.addEventListener("load", () => {
  const splash = document.getElementById("splash");
  if (!splash) return;
  setTimeout(() => splash.style.opacity = "0", 500);
  setTimeout(() => splash.remove(), 1100);
});
</script>

<!-- ================= Age Gate Script ================= -->
<script>
function acceptAge() {
  localStorage.setItem("ageVerified", "true");
  document.getElementById("ageGate").style.display = "none";
}

window.addEventListener("load", () => {
  if (localStorage.getItem("ageVerified") === "true") {
    document.getElementById("ageGate").style.display = "none";
  }
});
</script>

<!-- ================= Service Worker ================= -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
