<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquorland | Delivery de Bebidas</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0c10;
color:white;
}

header{
background:#111;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
padding:20px;
}

.card{
background:#181a20;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.card img{
width:100%;
height:210px;
object-fit:contain;
background:white;
}

.content{
padding:14px;
}

.name{
font-weight:bold;
margin-bottom:6px;
}

.price{
color:#d4af37;
margin-bottom:10px;
}

button{
background:#d4af37;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#d4af37;
color:black;
padding:14px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>Liquorland 🍾</header>

<div class="grid" id="grid"></div>

<div class="cart" onclick="sendOrder()">
🛒 Pedido (<span id="count">0</span>)
</div>

<script>

const WA="61423703514";

let cart={};

const products=[

/* ===== FERNET ===== */
{id:"fernet1",name:"Fernet Branca 750ml",price:"Consultar",img:"cat_fernet.jpg"},
{id:"fernet2",name:"Fernet 1882 750ml",price:"Consultar",img:"cat_fernet.jpg"},

/* ===== WHISKY ===== */
{id:"whisky1",name:"Johnnie Walker Red Label",price:"Consultar",img:"cat_whisky.jpg"},
{id:"whisky2",name:"Johnnie Walker Black Label",price:"Consultar",img:"cat_whisky.jpg"},
{id:"whisky3",name:"Jameson Irish Whiskey",price:"Consultar",img:"cat_whisky.jpg"},
{id:"whisky4",name:"Jack Daniels",price:"Consultar",img:"cat_whisky.jpg"},
{id:"whisky5",name:"Chivas Regal 12",price:"Consultar",img:"cat_whisky.jpg"},

/* ===== VODKA ===== */
{id:"vodka1",name:"Smirnoff Vodka",price:"Consultar",img:"cat_vodka.jpg"},
{id:"vodka2",name:"Absolut Vodka",price:"Consultar",img:"cat_vodka.jpg"},
{id:"vodka3",name:"Skyy Vodka",price:"Consultar",img:"cat_vodka.jpg"},

/* ===== GIN ===== */
{id:"gin1",name:"Bombay Sapphire",price:"Consultar",img:"cat_gin.jpg"},
{id:"gin2",name:"Tanqueray",price:"Consultar",img:"cat_gin.jpg"},
{id:"gin3",name:"Beefeater",price:"Consultar",img:"cat_gin.jpg"},

/* ===== CERVEZAS ===== */
{id:"beer1",name:"Corona 330ml",price:"Consultar",img:"cat_beer.jpg"},
{id:"beer2",name:"Heineken 473ml",price:"Consultar",img:"cat_beer.jpg"},
{id:"beer3",name:"Stella Artois 473ml",price:"Consultar",img:"cat_beer.jpg"},
{id:"beer4",name:"Budweiser 473ml",price:"Consultar",img:"cat_beer.jpg"},
{id:"beer5",name:"Quilmes 473ml",price:"Consultar",img:"cat_beer.jpg"},

/* ===== ENERGIZANTES ===== */
{id:"energy1",name:"Red Bull 250ml",price:"Consultar",img:"cat_energy.jpg"},
{id:"energy2",name:"Monster 473ml",price:"Consultar",img:"cat_energy.jpg"},
{id:"energy3",name:"Speed 473ml",price:"Consultar",img:"cat_energy.jpg"},

/* ===== GASEOSAS ===== */
{id:"soft1",name:"Coca Cola 2.25L",price:"Consultar",img:"cat_soft.jpg"},
{id:"soft2",name:"Coca Cola Zero",price:"Consultar",img:"cat_soft.jpg"},
{id:"soft3",name:"Sprite 2.25L",price:"Consultar",img:"cat_soft.jpg"},
{id:"soft4",name:"Fanta Naranja",price:"Consultar",img:"cat_soft.jpg"},

/* ===== VINOS ===== */
{id:"wine1",name:"Malbec 750ml",price:"Consultar",img:"cat_wine.jpg"},
{id:"wine2",name:"Cabernet Sauvignon",price:"Consultar",img:"cat_wine.jpg"},
{id:"wine3",name:"Espumante",price:"Consultar",img:"cat_wine.jpg"},

/* ===== AGUAS ===== */
{id:"water1",name:"Agua Mineral 2L",price:"Consultar",img:"cat_water.jpg"},
{id:"water2",name:"Agua Saborizada",price:"Consultar",img:"cat_water.jpg"}

];

const grid=document.getElementById("grid");

products.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="content">
<div class="name">${p.name}</div>
<div class="price">${p.price}</div>
<button onclick="add('${p.id}','${p.name}')">Agregar</button>
</div>
</div>`;
});

function add(id,name){
cart[id]=(cart[id]||0)+1;
document.getElementById("count").innerText=
Object.values(cart).reduce((a,b)=>a+b,0);
}

function sendOrder(){

if(Object.keys(cart).length===0){
alert("Agrega productos primero");
return;
}

let msg="Hola Liquorland 👋%0AQuiero pedir:%0A%0A";

for(let id in cart){
let p=products.find(x=>x.id===id);
msg+=`• ${cart[id]} x ${p.name}%0A`;
}

msg+="%0AMi dirección:";

window.open(`https://wa.me/${WA}?text=${msg}`);
}

</script>

</body>
</html>
