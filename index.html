<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquorland | Delivery San Juan</title>

<style>
:root{
--bg:#0b0b0c;
--card:#151518;
--gold:#d4af37;
--text:#fff;
--muted:#aaa;
}
body{
margin:0;
font-family:-apple-system,Segoe UI,Roboto,Arial;
background:var(--bg);
color:var(--text);
}
header{
position:sticky;
top:0;
background:#0b0b0cf0;
padding:14px;
border-bottom:1px solid #222;
z-index:10;
}
.wrap{max-width:1100px;margin:auto;}
.brand{display:flex;gap:10px;align-items:center}
.logo{
width:40px;height:40px;border-radius:12px;
background:linear-gradient(135deg,#8b6b0f,var(--gold));
display:grid;place-items:center;
font-weight:900;color:#000;
}
.search{
width:100%;
margin-top:10px;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
}
.pills{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}
.pill{
padding:8px 12px;
border-radius:999px;
border:1px solid #333;
cursor:pointer;
font-weight:700;
}
.pill.active{
border-color:var(--gold);
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:16px;
}
@media(min-width:900px){
.grid{grid-template-columns:repeat(4,1fr);}
}
.card{
background:var(--card);
border-radius:16px;
overflow:hidden;
display:flex;
flex-direction:column;
}
.imgWrap{
background:#fff;
height:150px;
display:flex;
align-items:center;
justify-content:center;
}
.imgWrap img{
max-height:130px;
max-width:90%;
}
.content{padding:12px;}
.name{font-weight:900;font-size:17px}
.meta{color:var(--muted);font-size:13px}
.price{color:var(--gold);font-weight:900}
.row{display:flex;gap:10px;margin-top:10px}
.qty{
display:flex;
align-items:center;
gap:8px;
}
.qty button{
width:30px;height:30px;
border-radius:50%;
border:none;
background:#222;
color:white;
font-weight:900;
}
.addBtn{
flex:1;
border:none;
background:var(--gold);
color:#000;
font-weight:900;
border-radius:10px;
}
.cartFab{
position:fixed;
bottom:18px;
right:18px;
display:flex;
gap:10px;
}
.fab{
border:none;
border-radius:999px;
padding:14px;
font-weight:900;
}
.cartBtn{background:#222;color:#fff}
.waBtn{background:#25D366;color:#000}
.modalBack{
position:fixed;
inset:0;
background:#000a;
display:none;
align-items:center;
justify-content:center;
}
.modal{
background:#151518;
padding:20px;
border-radius:16px;
width:90%;
max-width:420px;
}
</style>
</head>

<body>

<header class="wrap">
<div class="brand">
<div class="logo">L</div>
<div>
<b>Liquorland</b><br>
<small style="color:#aaa">San Juan • Delivery • WhatsApp</small>
</div>
</div>

<input id="q" class="search" placeholder="Buscar bebida...">

<div id="pills" class="pills"></div>
</header>

<div id="grid" class="grid"></div>

<div class="cartFab">
<button class="fab cartBtn" onclick="openCart()">🛒 <span id="count">0</span></button>
<button class="fab waBtn" onclick="sendWhatsApp()">WhatsApp</button>
</div>

<div id="modal" class="modalBack">
<div class="modal">
<h3>Tu pedido</h3>
<div id="cartItems"></div>
<br>
<button onclick="closeCart()">Cerrar</button>
</div>
</div>

<script>

const WA="61423703514";

/* ======================
CATÁLOGO COMPLETO
====================== */

const products=[

{ name:"Fernet Branca 750ml", cat:"Fernet", price:"Consultar", img:"img_8733.webp" },
{ name:"Whisky Jameson 750ml", cat:"Whisky", price:"Consultar", img:"img_8734.jpeg" },
{ name:"Vodka Smirnoff 750ml", cat:"Vodka", price:"Consultar", img:"img_8735.jpeg" },
{ name:"Gin Bombay Sapphire 750ml", cat:"Gin", price:"Consultar", img:"img_8736.jpeg" },

{ name:"Corona Botella", cat:"Cerveza", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Heineken Lata 473ml", cat:"Cerveza", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Stella Artois 473ml", cat:"Cerveza", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Budweiser 473ml", cat:"Cerveza", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Quilmes 473ml", cat:"Cerveza", price:"Consultar", img:"img_8737.jpeg" },

{ name:"Red Bull", cat:"Energizante", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Monster Energy", cat:"Energizante", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Speed", cat:"Energizante", price:"Consultar", img:"img_8737.jpeg" },

{ name:"Coca Cola 2L", cat:"Gaseosa", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Sprite 2L", cat:"Gaseosa", price:"Consultar", img:"img_8737.jpeg" },
{ name:"Fanta 2L", cat:"Gaseosa", price:"Consultar", img:"img_8737.jpeg" },

{ name:"Agua Mineral", cat:"Agua", price:"Consultar", img:"img_8737.jpeg" }

];

/* ======================
APP
====================== */

let cart={};
let active="Todos";

const grid=document.getElementById("grid");
const q=document.getElementById("q");

function categories(){
return ["Todos",...new Set(products.map(p=>p.cat))];
}

function renderPills(){
const pills=document.getElementById("pills");
pills.innerHTML="";
categories().forEach(c=>{
const d=document.createElement("div");
d.className="pill"+(c===active?" active":"");
d.innerText=c;
d.onclick=()=>{active=c;renderPills();render();}
pills.appendChild(d);
});
}

function filtered(){
return products.filter(p=>{
const catOk=active==="Todos"||p.cat===active;
const textOk=p.name.toLowerCase().includes(q.value.toLowerCase());
return catOk&&textOk;
});
}

function change(name,v){
cart[name]=(cart[name]||1)+v;
if(cart[name]<1)cart[name]=1;
updateCount();
}

function add(name){
cart[name]=(cart[name]||0)+1;
updateCount();
}

function updateCount(){
document.getElementById("count").innerText=
Object.values(cart).reduce((a,b)=>a+b,0);
}

function card(p){
return `
<div class="card">
<div class="imgWrap"><img src="${p.img}"></div>
<div class="content">
<div class="name">${p.name}</div>
<div class="meta">${p.cat}</div>
<div class="price">${p.price}</div>

<div class="row">
<div class="qty">
<button onclick="change('${p.name}',-1)">-</button>
<button onclick="add('${p.name}')">+</button>
</div>
<button class="addBtn" onclick="add('${p.name}')">Agregar</button>
</div>
</div>
</div>`;
}

function render(){
grid.innerHTML=filtered().map(card).join("");
}

function openCart(){
document.getElementById("modal").style.display="flex";
const box=document.getElementById("cartItems");
box.innerHTML="";
Object.entries(cart).forEach(([n,q])=>{
box.innerHTML+=`<div>${n} x${q}</div>`;
});
}

function closeCart(){
document.getElementById("modal").style.display="none";
}

function sendWhatsApp(){
let msg="Hola Liquorland 👋%0AQuiero pedir:%0A";
Object.entries(cart).forEach(([n,q])=>{
msg+=`• ${n} x${q}%0A`;
});
window.open(`https://wa.me/${WA}?text=${msg}`);
}

q.oninput=render;

renderPills();
render();
updateCount();

</script>

</body>
</html>
