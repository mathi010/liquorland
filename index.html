<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Liquorland | San Juan Delivery</title>
  <meta name="description" content="Liquorland — Bebidas y entrega a domicilio en San Juan. Pedidos por WhatsApp." />

  <style>
    :root{
      --bg:#0d0d10; --card:#17181a; --text:#f2f2f2; --muted:#bdbdbd;
      --gold:#d4af37; --line:#2a2b2f;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:5;background:rgba(13,13,16,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1050px;margin:0 auto;padding:14px 14px}
    .top{display:flex;gap:12px;align-items:center}
    .brand{display:flex;gap:10px;align-items:center;min-width:170px}
    .logo{width:38px;height:38px;border-radius:10px;background:var(--gold)}
    h1{margin:0;font-size:22px;letter-spacing:.5px}
    .tag{color:var(--muted);font-size:13px;margin-top:2px}
    .search{flex:1;min-width:220px;display:flex;gap:10px;align-items:center}
    input{
      width:100%;max-width:520px;padding:12px 12px;border-radius:12px;
      border:1px solid var(--line);background:#101114;color:var(--text);outline:none
    }
    .pillbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{
      border:1px solid var(--line);background:#101114;color:var(--text);
      padding:8px 10px;border-radius:999px;font-size:13px;cursor:pointer;user-select:none
    }
    .pill.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,175,55,.15) inset}
    main{padding:18px 0 80px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    @media(min-width:820px){.grid{grid-template-columns:repeat(3,1fr)}}
    .card{
      background:var(--card);border:1px solid var(--line);
      border-radius:18px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.35)
    }
    .img{
      height:160px;background:#fff;display:flex;align-items:center;justify-content:center
    }
    .img img{max-height:150px;max-width:90%;object-fit:contain}
    .content{padding:12px 12px 14px}
    .name{font-weight:800;font-size:18px;margin-bottom:6px}
    .price{color:var(--gold);font-size:16px;margin-bottom:12px}
    .btn{
      display:block;text-align:center;text-decoration:none;
      background:var(--gold);color:#111;font-weight:800;
      padding:12px;border-radius:14px
    }
    footer{border-top:1px solid var(--line);color:var(--muted);font-size:13px}
    .wa{
      position:fixed;right:14px;bottom:14px;
      background:var(--gold);color:#111;text-decoration:none;font-weight:900;
      padding:12px 14px;border-radius:999px;box-shadow:0 14px 30px rgba(0,0,0,.4)
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="top">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1>Liquorland</h1>
            <div class="tag">San Juan • Entrega • Pedidos por WhatsApp</div>
          </div>
        </div>
        <div class="search">
          <input id="q" placeholder="Buscar (ej: Fernet, Vodka, Corona)..." />
        </div>
      </div>

      <div class="pillbar" id="pills">
        <div class="pill active" data-cat="all">Todos</div>
        <div class="pill" data-cat="Fernet">Fernet</div>
        <div class="pill" data-cat="Whisky">Whisky</div>
        <div class="pill" data-cat="Vodka">Vodka</div>
        <div class="pill" data-cat="Gin">Ginebra</div>
        <div class="pill" data-cat="Beer">Cerveza</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid" id="grid"></div>
  </main>

  <footer class="wrap">
    © 2026 Liquorland • Los precios pueden cambiar • WhatsApp: +61 423 703 514
  </footer>

  <a class="wa" href="https://wa.me/61423703514" target="_blank">WhatsApp</a>

  <script>
    const WA = "61423703514";

    // IMPORTANTE: estos nombres de archivo deben ser EXACTOS a los que están en tu repo
    const products = [
      { name:"Fernet Branca 750ml", cat:"Fernet", price:"Consultar", img:"IMG_8733.webp" },
      { name:"Whisky Jameson 750ml", cat:"Whisky", price:"Consultar", img:"IMG_8734.jpeg" },
      { name:"Vodka Smirnoff 750ml", cat:"Vodka", price:"Consultar", img:"IMG_8735.jpeg" },
      { name:"Gin Bombay Sapphire 750ml", cat:"Gin", price:"Consultar", img:"IMG_8736.jpeg" },
      { name:"Corona 330ml", cat:"Beer", price:"Consultar", img:"IMG_8737.jpeg" }
    ];

    let activeCat = "all";
    const grid = document.getElementById("grid");
    const q = document.getElementById("q");
    const pills = document.getElementById("pills");

    function waLink(p){
      const msg =
        `Hola Liquorland 👋\n` +
        `Quiero pedir:\n` +
        `• ${p.name}\n` +
        `Precio: ${p.price}\n\n` +
        `Mi zona / dirección: `;
      return `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
    }

    function render(){
      const query = (q.value || "").toLowerCase().trim();
      grid.innerHTML = "";

      products
        .filter(p => activeCat === "all" ? true : p.cat === activeCat)
        .filter(p => !query || p.name.toLowerCase().includes(query))
        .forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="img">
              <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div class="content">
              <div class="name">${p.name}</div>
              <div class="price">${p.price}</div>
              <a class="btn" href="${waLink(p)}" target="_blank">Pedir</a>
            </div>
          `;
          grid.appendChild(card);
        });
    }

    pills.addEventListener("click", (e) => {
      const pill = e.target.closest(".pill");
      if(!pill) return;
      activeCat = pill.dataset.cat;
      [...pills.querySelectorAll(".pill")].forEach(x => x.classList.remove("active"));
      pill.classList.add("active");
      render();
    });

    q.addEventListener("input", render);
    render();
  </script>
</body>
</html>
