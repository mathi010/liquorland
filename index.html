<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquorland | San Juan Delivery</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f10;
color:white;
}

header{
padding:20px;
text-align:center;
border-bottom:1px solid #222;
}

h1{
color:#d4af37;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#17181a;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.4);
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
background:white;
}

.content{
padding:12px;
flex:1;
}

.name{
font-weight:bold;
margin-bottom:6px;
}

.price{
color:#d4af37;
margin-bottom:10px;
}

.btn{
background:#d4af37;
color:black;
padding:10px;
border-radius:8px;
text-decoration:none;
display:block;
text-align:center;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #222;
font-size:14px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Liquorland</h1>
<p>San Juan • Entrega • Pedidos por WhatsApp</p>
</header>

<div class="grid" id="grid"></div>

<footer>
© 2026 Liquorland
</footer>

<script>

const WA="61423703514";

const products=[

{
name:"Fernet Branca 750ml",
price:"Consultar",
img:"IMG_8733.webp"
},

{
name:"Whisky Jameson 750ml",
price:"Consultar",
img:"IMG_8734.JPG"
},

{
name:"Vodka Smirnoff 750ml",
price:"Consultar",
img:"IMG_8735.JPG"
},

{
name:"Gin Bombay Sapphire 750ml",
price:"Consultar",
img:"IMG_8736.JPG"
},

{
name:"Corona 330ml",
price:"Consultar",
img:"IMG_8737.JPG"
}

];

function waLink(name){
const text=encodeURIComponent("Hola! Quiero pedir: "+name);
return `https://wa.me/${WA}?text=${text}`;
}

const grid=document.getElementById("grid");

products.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="content">
<div class="name">${p.name}</div>
<div class="price">${p.price}</div>
<a class="btn" href="${waLink(p.name)}">Pedir</a>
</div>
</div>
`;
});

</script>

</body>
</html>
