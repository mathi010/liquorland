<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquorland | Delivery San Juan</title>

<style>

:root{
  --bg:#0f0f10;
  --card:#17181a;
  --text:#ffffff;
  --gold:#d4af37;
  --line:#2a2b2f;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

header{
  text-align:center;
  padding:20px;
}

h1{
  color:var(--gold);
  font-size:28px;
}

.tag{
  color:#aaa;
  font-size:14px;
  margin-top:6px;
}

main{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}

.card{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,0,0,.4);
}

.img{
  height:200px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.img img{
  max-height:180px;
  max-width:90%;
}

.content{
  padding:15px;
}

.name{
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
}

.price{
  color:var(--gold);
  margin-bottom:12px;
}

.btn{
  background:var(--gold);
  border:none;
  padding:12px;
  width:100%;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

footer{
  text-align:center;
  padding:25px;
  color:#888;
  font-size:13px;
}

</style>
</head>

<body>

<header>
  <h1>Liquorland</h1>
  <div class="tag">San Juan • Delivery • Pedidos por WhatsApp</div>
</header>

<main>
  <div id="grid" class="grid"></div>
</main>

<footer>
© 2026 Liquorland
</footer>

<script>

const WA = "61423703514";

/* ===== PRODUCTOS ===== */

/* ===== PRODUCTOS ===== */

const products = [

{
name:"Fernet Branca 750ml",
price:"Consultar",
img:"IMG_8733.webp"
},

{
name:"Whisky Jameson 750ml",
price:"Consultar",
img:"IMG_8734.jpeg"
},

];

/* ===== LINK WHATSAPP ===== */

function waLink(p){

const msg =
`Hola Liquorland 👋
Quiero pedir:
• ${p.name}
Precio: ${p.price}

Mi zona / dirección:`;

return `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
}

/* ===== CREAR TARJETAS ===== */

const grid=document.getElementById("grid");

products.forEach(p=>{

grid.innerHTML+=`
<div class="card">

  <div class="img">
    <img src="${p.img}" alt="${p.name}">
  </div>

  <div class="content">
    <div class="name">${p.name}</div>
    <div class="price">${p.price}</div>
    <button class="btn"
      onclick="window.open('${waLink(p)}')">
      Pedir
    </button>
  </div>

</div>
`;
});

</script>

</body>
</html>
