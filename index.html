<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Liquorland | Delivery de Bebidas</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0c10;
color:white;
}

header{
background:#111;
padding:18px;
font-size:26px;
font-weight:bold;
text-align:center;
color:#d4af37;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
padding:20px;
}

.card{
background:#181a20;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.card img{
width:100%;
height:210px;
object-fit:contain;
background:white;
}

.info{padding:14px;}

.name{font-weight:bold;margin-bottom:6px;}

.price{color:#d4af37;margin-bottom:10px;}

button{
background:#d4af37;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#d4af37;
color:black;
padding:14px 18px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,.5);
}
</style>
</head>

<body>

<header>🍾 Liquorland Delivery</header>

<div class="grid" id="grid"></div>

<div class="cart" onclick="sendOrder()">
🛒 Pedido (<span id="count">0</span>)
</div>

<script>

const WA="61423703514";

let cart={};

const products=[

/* ===== FERNET ===== */
{id:"f1",name:"Fernet Branca 750ml",price:"Consultar",img:"IMG_8733.webp"},
{id:"f2",name:"Fernet Branca 450ml",price:"Consultar",img:"IMG_8733.webp"},
{id:"f3",name:"Fernet 1882",price:"Consultar",img:"IMG_8733.webp"},

/* ===== WHISKY ===== */
{id:"w1",name:"Jameson 750ml",price:"Consultar",img:"IMG_8734.jpeg"},
{id:"w2",name:"Johnnie Walker Red Label",price:"Consultar",img:"IMG_8734.jpeg"},
{id:"w3",name:"Johnnie Walker Black Label",price:"Consultar",img:"IMG_8734.jpeg"},
{id:"w4",name:"Jack Daniels",price:"Consultar",img:"IMG_8734.jpeg"},
{id:"w5",name:"Ballantines",price:"Consultar",img:"IMG_8734.jpeg"},
{id:"w6",name:"Chivas Regal",price:"Consultar",img:"IMG_8734.jpeg"},

/* ===== VODKA ===== */
{id:"v1",name:"Smirnoff Vodka",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"v2",name:"Absolut Vodka",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"v3",name:"Skyy Vodka",price:"Consultar",img:"IMG_8735.jpeg"},

/* ===== GIN ===== */
{id:"g1",name:"Bombay Sapphire",price:"Consultar",img:"IMG_8736.jpeg"},
{id:"g2",name:"Tanqueray",price:"Consultar",img:"IMG_8736.jpeg"},
{id:"g3",name:"Beefeater",price:"Consultar",img:"IMG_8736.jpeg"},

/* ===== CERVEZAS ===== */
{id:"b1",name:"Corona 330ml",price:"Consultar",img:"IMG_8737.jpeg"},
{id:"b2",name:"Heineken",price:"Consultar",img:"IMG_8737.jpeg"},
{id:"b3",name:"Stella Artois",price:"Consultar",img:"IMG_8737.jpeg"},
{id:"b4",name:"Budweiser",price:"Consultar",img:"IMG_8737.jpeg"},
{id:"b5",name:"Quilmes",price:"Consultar",img:"IMG_8737.jpeg"},
{id:"b6",name:"Patagonia",price:"Consultar",img:"IMG_8737.jpeg"},

/* ===== VINOS ===== */
{id:"vi1",name:"Malbec",price:"Consultar",img:"IMG_8733.webp"},
{id:"vi2",name:"Cabernet Sauvignon",price:"Consultar",img:"IMG_8733.webp"},
{id:"vi3",name:"Espumante",price:"Consultar",img:"IMG_8733.webp"},

/* ===== ENERGIZANTES ===== */
{id:"e1",name:"Red Bull",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"e2",name:"Monster",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"e3",name:"Speed",price:"Consultar",img:"IMG_8735.jpeg"},

/* ===== GASEOSAS ===== */
{id:"s1",name:"Coca Cola 2.25L",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"s2",name:"Coca Cola Zero",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"s3",name:"Sprite",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"s4",name:"Fanta",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"s5",name:"Pepsi",price:"Consultar",img:"IMG_8735.jpeg"},

/* ===== AGUAS Y JUGOS ===== */
{id:"a1",name:"Agua Mineral",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"a2",name:"Agua con Gas",price:"Consultar",img:"IMG_8735.jpeg"},
{id:"a3",name:"Jugo Baggio",price:"Consultar",img:"IMG_8735.jpeg"}

];

const grid=document.getElementById("grid");

products.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price}</div>
<button onclick="add(${i})">Agregar</button>
</div>
</div>`;
});

function add(i){
const id=products[i].id;
cart[id]=(cart[id]||0)+1;
document.getElementById("count").innerText=
Object.values(cart).reduce((a,b)=>a+b,0);
}

function sendOrder(){

if(Object.keys(cart).length===0){
alert("Agrega productos primero");
return;
}

let msg="Hola Liquorland 👋%0AQuiero pedir:%0A%0A";

for(let id in cart){
let p=products.find(x=>x.id===id);
msg+=`• ${cart[id]} x ${p.name}%0A`;
}

msg+="%0AMi dirección:";

window.open(`https://wa.me/${WA}?text=${msg}`);
}

</script>

</body>
</html>
