<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquorland | San Juan Delivery</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f10;
  color:white;
}

header{
  padding:20px;
  text-align:center;
}

h1{
  color:#d4af37;
  margin:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#17181a;
  border-radius:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.img{
  height:170px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

.img img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.content{
  padding:12px;
}

.name{
  font-weight:bold;
}

.price{
  color:#d4af37;
  margin-top:8px;
}

button{
  margin-top:10px;
  background:#d4af37;
  border:none;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}
footer{
  text-align:center;
  padding:20px;
  font-size:13px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Liquorland</h1>
<div>San Juan • Delivery • Pedidos por WhatsApp</div>
</header>

<main>
<div class="grid" id="grid"></div>
</main>

<footer>
© 2026 Liquorland
</footer>

<script>

const WA = "61423703514";

const products = [

{
name:"Fernet Branca 750ml",
price:"Consultar",
img:"IMG_8733.webp"
},

{
name:"Whisky Jameson 750ml",
price:"Consultar",
img:"IMG_8734.jpeg"
},

{
name:"Vodka Smirnoff 750ml",
price:"Consultar",
img:"IMG_8735.jpeg"
},

{
name:"Gin Bombay Sapphire 750ml",
price:"Consultar",
img:"IMG_8736.jpeg"
},

{
name:"Corona 330ml",
price:"Consultar",
img:"IMG_8737.jpeg"
}

];

function waLink(product){
const text = encodeURIComponent(
`Hola! Quiero pedir ${product.name}`
);
return `https://wa.me/${WA}?text=${text}`;
}

function card(p){
return `
<div class="card">
  <div class="img">
    <img src="${p.img}">
  </div>

  <div class="content">
    <div class="name">${p.name}</div>
    <div class="price">${p.price}</div>
    <a href="${waLink(p)}">
      <button>Pedido</button>
    </a>
  </div>
</div>
`;
}

document.getElementById("grid").innerHTML =
products.map(card).join("");

</script>

</body>
</html>
