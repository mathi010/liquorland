<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiquorStore</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7a00">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-512.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splash-card">
    <img src="icons/icon-192.png" class="logo">
    <h1>LiquorStore</h1>
    <p>San Juan, Argentina</p>
  </div>
</div>

<!-- AGE GATE -->
<div id="ageGate" class="agegate hidden">
  <div class="age-card">
    <h2>+18</h2>
    <p>Debes ser mayor de edad para ingresar</p>
    <button onclick="enterSite()">Soy mayor de 18</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <h1>LiquorStore</h1>
  <p>Delivery en San Juan</p>
  <div id="products"></div>
</div>

<script src="app.js"></script>

</body>
</html>
